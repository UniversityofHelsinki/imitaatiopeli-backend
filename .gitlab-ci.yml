image: quay.io/tike/alpine-oc-node

stages:
    - setup
    - test

variables:
    npm_config_cache: '$CI_PROJECT_DIR/.npm'
    PROJECT_NAME: 'imitaatiopeli-backend'
    PROJECT_VERSION: '1.0.0'

.dependencies_cache:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm
        policy: pull

# Define the process for setup stage
setup:
    stage: setup
    image: node:22-alpine
    tags:
        - ohtu-build-4
    script:
        - npm ci
    extends: .dependencies_cache
    cache:
        policy: pull-push
    artifacts:
        expire_in: 1h
        paths:
            - node_modules

test:
    stage: test
    tags:
        - ohtu-build-4
    script:
        - npm test
